name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install ruff
        run: uv pip install --system ruff

      - name: Run ruff
        run: ruff check src/ tests/

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      # The pure-logic tests only need a small subset of the runtime
      # dependencies (no torch / paddle / faiss / ram). Installing the
      # full dependency tree on every CI run would burn ~5 minutes on
      # multi-GB ML wheels for tests that don't exercise them.
      - name: Install test dependencies
        run: |
          uv pip install --system \
            pyyaml \
            numpy \
            titlecase \
            requests \
            Pillow \
            pillow-heif \
            pytest

      - name: Install package (no deps)
        run: uv pip install --system --no-deps -e .

      - name: Run pytest
        run: pytest
